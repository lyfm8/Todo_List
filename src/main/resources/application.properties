# ==========================================
# APPLICATION CONFIGURATION
# ==========================================
spring.application.name=todo_list

# ==========================================
# DATABASE CONFIGURATION (MySQL Cloud - Aiven)
# ==========================================

spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=true&requireSSL=true&serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=UTF-8
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ==========================================
# JPA / HIBERNATE CONFIGURATION (Code First)
# ==========================================
# update: Hibernate tự tạo/cập nhật schema từ Entity khi khởi động
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ==========================================
# THYMELEAF CONFIGURATION
# ==========================================
spring.thymeleaf.cache=true
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# ==========================================
# SERVER CONFIGURATION
# ==========================================
# Render tự động set biến PORT, fallback về 8081 khi chạy local
server.port=${PORT:8081}
server.servlet.context-path=/

# ==========================================
# LOGGING
# ==========================================
# Giảm log verbosity cho production (TRACE quá nặng)
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN