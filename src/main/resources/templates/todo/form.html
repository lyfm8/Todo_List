<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${formTitle + ' – Todo List'}">Form – Todo List</title>

    <!-- Bootstrap 5 CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>

    <style>
        body { background-color: #f8f9fa; }
        .navbar-brand { font-weight: 700; letter-spacing: 0.5px; }
        .card { border: none; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
        .form-label { font-weight: 600; font-size: .875rem; }
        .char-counter { font-size: .75rem; color: #6c757d; }
    </style>
</head>
<body>

<!-- ===== NAVBAR ===== -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" href="/todos">
            <i class="bi bi-check2-square me-2"></i>Todo List
        </a>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">

            <!-- Breadcrumb -->
            <nav aria-label="breadcrumb" class="mb-3">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item">
                        <a href="/todos" class="text-decoration-none">Danh sách</a>
                    </li>
                    <li class="breadcrumb-item active" th:text="${formTitle}"></li>
                </ol>
            </nav>

            <!-- Card Form -->
            <div class="card">
                <div class="card-header py-3">
                    <h5 class="mb-0 fw-bold">
                        <i class="bi me-2"
                           th:classappend="${isEdit} ? 'bi-pencil-square' : 'bi-plus-circle'"></i>
                        <span th:text="${formTitle}"></span>
                    </h5>
                </div>

                <div class="card-body p-4">

                    <!--
                        Form thêm mới: POST /todos
                        Form chỉnh sửa: POST /todos/{id}
                        Dùng th:action để tự động chọn đúng URL.
                    -->
                    <form th:action="${isEdit} ? @{/todos/{id}(id=${todoId})} : @{/todos}"
                          th:object="${todoForm}"
                          method="post"
                          novalidate>

                        <!-- TITLE -->
                        <div class="mb-3">
                            <label for="title" class="form-label">
                                Tên công việc <span class="text-danger">*</span>
                            </label>
                            <input type="text"
                                   id="title"
                                   th:field="*{title}"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'"
                                   placeholder="Nhập tên công việc..."
                                   maxlength="100"/>
                            <!-- Hiển thị lỗi validation -->
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}"
                                 th:errors="*{title}">
                            </div>
                            <div class="char-counter text-end mt-1">
                                <span id="titleCount">0</span>/100 ký tự
                            </div>
                        </div>

                        <!-- DESCRIPTION -->
                        <div class="mb-3">
                            <label for="description" class="form-label">Mô tả</label>
                            <textarea id="description"
                                      th:field="*{description}"
                                      class="form-control"
                                      th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'"
                                      rows="4"
                                      placeholder="Nhập mô tả công việc (tùy chọn)..."
                                      maxlength="500">
                            </textarea>
                            <!-- Hiển thị lỗi validation -->
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}"
                                 th:errors="*{description}">
                            </div>
                            <div class="char-counter text-end mt-1">
                                <span id="descCount">0</span>/500 ký tự
                            </div>
                        </div>

                        <!-- STATUS (chỉ hiển thị khi chỉnh sửa) -->
                        <div class="mb-4" th:if="${isEdit}">
                            <label for="status" class="form-label">Trạng thái</label>
                            <select id="status" th:field="*{status}" class="form-select">
                                <option th:each="s : ${statuses}"
                                        th:value="${s}"
                                        th:text="${s.name() == 'PENDING'} ? 'Chưa hoàn thành' : 'Đã hoàn thành'">
                                </option>
                            </select>
                        </div>

                        <!-- BUTTONS -->
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi me-1"
                                   th:classappend="${isEdit} ? 'bi-save' : 'bi-plus-lg'"></i>
                                <span th:text="${isEdit} ? 'Lưu thay đổi' : 'Thêm công việc'"></span>
                            </button>
                            <a href="/todos" class="btn btn-outline-secondary">
                                <i class="bi bi-x-lg me-1"></i>Hủy
                            </a>
                        </div>

                    </form>
                </div>
            </div>
            <!-- End card -->

        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    /**
     * Cập nhật bộ đếm ký tự cho input/textarea.
     * @param {string} inputId   - ID của input element
     * @param {string} counterId - ID của span hiển thị số đếm
     */
    function updateCharCount(inputId, counterId) {
        const input = document.getElementById(inputId);
        const counter = document.getElementById(counterId);
        if (input && counter) {
            counter.textContent = input.value.length;
            input.addEventListener('input', () => {
                counter.textContent = input.value.length;
            });
        }
    }

    // Khởi tạo bộ đếm sau khi DOM load xong
    document.addEventListener('DOMContentLoaded', function () {
        updateCharCount('title', 'titleCount');
        updateCharCount('description', 'descCount');
    });
</script>

</body>
</html>
