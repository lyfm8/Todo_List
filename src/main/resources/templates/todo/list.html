<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Danh sách công việc – Todo List</title>

    <!-- Bootstrap 5 CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>

    <style>
        body { background-color: #f8f9fa; }
        .navbar-brand { font-weight: 700; letter-spacing: 0.5px; }
        .card { border: none; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
        .table th { background-color: #f1f3f5; font-weight: 600; font-size: .875rem; }
        .badge-pending   { background-color: #ffc107; color: #212529; }
        .badge-completed { background-color: #198754; }
        .sort-link { text-decoration: none; color: inherit; }
        .sort-link:hover { color: #0d6efd; }
        .page-item.active .page-link { background-color: #0d6efd; border-color: #0d6efd; }
    </style>
</head>
<body>

<!-- ===== NAVBAR ===== -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" href="/todos">
            <i class="bi bi-check2-square me-2"></i>Todo List
        </a>
        <div class="ms-auto">
            <a href="/todos/new" class="btn btn-light btn-sm">
                <i class="bi bi-plus-lg me-1"></i>Thêm công việc
            </a>
        </div>
    </div>
</nav>

<div class="container">

    <!-- ===== FLASH MESSAGES ===== -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle me-2"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle me-2"></i>
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- ===== SEARCH + FILTER FORM ===== -->
    <div class="card mb-4">
        <div class="card-body">
            <form th:action="@{/todos}" method="get" class="row g-2 align-items-end">

                <!-- Search -->
                <div class="col-md-5">
                    <label for="keyword" class="form-label fw-semibold">Tìm kiếm</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-search"></i></span>
                        <input type="text" id="keyword" name="keyword"
                               class="form-control"
                               placeholder="Nhập tên công việc..."
                               th:value="${keyword}"/>
                    </div>
                </div>

                <!-- Filter Status -->
                <div class="col-md-3">
                    <label for="status" class="form-label fw-semibold">Trạng thái</label>
                    <select id="status" name="status" class="form-select">
                        <option value="" th:selected="${status == null}">Tất cả</option>
                        <option value="PENDING"
                                th:selected="${status != null and status.name() == 'PENDING'}">
                            Chưa hoàn thành
                        </option>
                        <option value="COMPLETED"
                                th:selected="${status != null and status.name() == 'COMPLETED'}">
                            Đã hoàn thành
                        </option>
                    </select>
                </div>

                <!-- Sort Field -->
                <div class="col-md-2">
                    <label for="sortBy" class="form-label fw-semibold">Sắp xếp theo</label>
                    <select id="sortBy" name="sortBy" class="form-select">
                        <option value="createdAt" th:selected="${sortBy == 'createdAt'}">Ngày tạo</option>
                        <option value="updatedAt" th:selected="${sortBy == 'updatedAt'}">Ngày cập nhật</option>
                        <option value="title"     th:selected="${sortBy == 'title'}">Tên</option>
                    </select>
                </div>

                <!-- Sort Direction -->
                <div class="col-md-1">
                    <label for="sortDir" class="form-label fw-semibold">Chiều</label>
                    <select id="sortDir" name="sortDir" class="form-select">
                        <option value="desc" th:selected="${sortDir == 'desc'}">&#8595; Giảm</option>
                        <option value="asc"  th:selected="${sortDir == 'asc'}">&#8593; Tăng</option>
                    </select>
                </div>

                <!-- Buttons -->
                <div class="col-md-1 d-flex gap-1">
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-funnel"></i>
                    </button>
                    <a href="/todos" class="btn btn-outline-secondary w-100">
                        <i class="bi bi-x-lg"></i>
                    </a>
                </div>

            </form>
        </div>
    </div>

    <!-- ===== BẢNG TODO ===== -->
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center py-3">
            <span class="fw-semibold">
                <i class="bi bi-list-task me-2"></i>
                Danh sách công việc
                <span class="badge bg-secondary ms-2" th:text="${todoPage.totalElements}">0</span>
            </span>
        </div>

        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0 align-middle">
                    <thead>
                    <tr>
                        <th style="width:50px">#</th>
                        <th>Tên công việc</th>
                        <th style="width:200px">Mô tả</th>
                        <th style="width:130px">Trạng thái</th>
                        <th style="width:140px">Ngày tạo</th>
                        <th style="width:140px">Cập nhật</th>
                        <th style="width:160px" class="text-center">Thao tác</th>
                    </tr>
                    </thead>
                    <tbody>

                    <!-- Không có dữ liệu -->
                    <tr th:if="${todoPage.content.isEmpty()}">
                        <td colspan="7" class="text-center py-4 text-muted">
                            <i class="bi bi-inbox fs-3 d-block mb-2"></i>
                            Không có công việc nào
                        </td>
                    </tr>

                    <!-- Danh sách Todo -->
                    <tr th:each="todo, stat : ${todoPage.content}">
                        <td class="text-muted small" th:text="${stat.index + 1 + currentPage * 5}"></td>

                        <td>
                            <span class="fw-semibold"
                                  th:text="${todo.title}"
                                  th:classappend="${todo.status.name() == 'COMPLETED'} ? 'text-decoration-line-through text-muted' : ''">
                            </span>
                        </td>

                        <td class="text-muted small text-truncate" style="max-width:200px"
                            th:text="${todo.description != null and !todo.description.isEmpty()} ? ${todo.description} : '—'">
                        </td>

                        <!-- Badge trạng thái -->
                        <td>
                            <span th:if="${todo.status.name() == 'PENDING'}"
                                  class="badge badge-pending rounded-pill">
                                <i class="bi bi-clock me-1"></i>Chưa xong
                            </span>
                            <span th:if="${todo.status.name() == 'COMPLETED'}"
                                  class="badge badge-completed rounded-pill">
                                <i class="bi bi-check2 me-1"></i>Hoàn thành
                            </span>
                        </td>

                        <!-- Ngày tạo -->
                        <td class="small text-muted"
                            th:text="${#temporals.format(todo.createdAt, 'dd/MM/yyyy HH:mm')}">
                        </td>

                        <!-- Ngày cập nhật -->
                        <td class="small text-muted"
                            th:text="${#temporals.format(todo.updatedAt, 'dd/MM/yyyy HH:mm')}">
                        </td>

                        <!-- Thao tác -->
                        <td class="text-center">
                            <div class="btn-group btn-group-sm">

                                <!-- Toggle trạng thái -->
                                <form th:action="@{/todos/{id}/toggle(id=${todo.id})}" method="post">
                                    <button type="submit"
                                            class="btn btn-sm me-1"
                                            th:classappend="${todo.status.name() == 'PENDING'} ? 'btn-outline-success' : 'btn-outline-secondary'"
                                            th:title="${todo.status.name() == 'PENDING'} ? 'Đánh dấu hoàn thành' : 'Đánh dấu chưa xong'">
                                        <i class="bi"
                                           th:classappend="${todo.status.name() == 'PENDING'} ? 'bi-check2-circle' : 'bi-arrow-counterclockwise'">
                                        </i>
                                    </button>
                                </form>

                                <!-- Sửa -->
                                <a th:href="@{/todos/{id}/edit(id=${todo.id})}"
                                   class="btn btn-sm btn-outline-primary me-1"
                                   title="Chỉnh sửa">
                                    <i class="bi bi-pencil"></i>
                                </a>

                                <!-- Xóa (có confirm) -->
                                <!-- Dùng data-* thay vì th:onclick vì Thymeleaf chặn string expression trong event handler -->
                                <form th:action="@{/todos/{id}/delete(id=${todo.id})}" method="post"
                                      th:id="'delete-form-' + ${todo.id}">
                                    <button type="button"
                                            class="btn btn-sm btn-outline-danger delete-btn"
                                            title="Xóa"
                                            th:data-id="${todo.id}"
                                            th:data-title="${todo.title}">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>

                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- ===== PHÂN TRANG ===== -->
        <div class="card-footer d-flex justify-content-between align-items-center py-3"
             th:if="${totalPages > 1}">

            <small class="text-muted">
                Trang <strong th:text="${currentPage + 1}"></strong>
                / <strong th:text="${totalPages}"></strong>
                &nbsp;|&nbsp;
                Tổng <strong th:text="${todoPage.totalElements}"></strong> bản ghi
            </small>

            <nav>
                <ul class="pagination pagination-sm mb-0">

                    <!-- Previous -->
                    <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/todos(page=${currentPage - 1}, keyword=${keyword}, status=${status}, sortBy=${sortBy}, sortDir=${sortDir})}">
                            <i class="bi bi-chevron-left"></i>
                        </a>
                    </li>

                    <!-- Số trang -->
                    <li class="page-item"
                        th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                        th:classappend="${i == currentPage} ? 'active'">
                        <a class="page-link"
                           th:href="@{/todos(page=${i}, keyword=${keyword}, status=${status}, sortBy=${sortBy}, sortDir=${sortDir})}"
                           th:text="${i + 1}">
                        </a>
                    </li>

                    <!-- Next -->
                    <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/todos(page=${currentPage + 1}, keyword=${keyword}, status=${status}, sortBy=${sortBy}, sortDir=${sortDir})}">
                            <i class="bi bi-chevron-right"></i>
                        </a>
                    </li>

                </ul>
            </nav>
        </div>

    </div>
    <!-- End card -->

</div>
<!-- End container -->

<!-- ===== MODAL XÁC NHẬN XÓA ===== -->
<div class="modal fade" id="deleteConfirmModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
        <div class="modal-content">
            <div class="modal-header border-0 pb-0">
                <h6 class="modal-title fw-bold">
                    <i class="bi bi-exclamation-triangle-fill text-danger me-2"></i>Xác nhận xóa
                </h6>
                <button type="button" class="btn-close btn-sm" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body pt-2">
                <p class="mb-0 small">Bạn có chắc muốn xóa công việc <strong id="deleteTodoTitle"></strong>?</p>
            </div>
            <div class="modal-footer border-0 pt-0">
                <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Hủy</button>
                <button type="button" class="btn btn-danger btn-sm" id="confirmDeleteBtn">Xóa</button>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // ID của form xóa đang được chọn
    let currentDeleteFormId = null;

    document.addEventListener('DOMContentLoaded', function () {

        // Lắng nghe sự kiện click trên tất cả nút xóa (dùng event delegation)
        // Đọc todoId và title từ data-* attribute thay vì dùng th:onclick
        document.querySelectorAll('.delete-btn').forEach(function (btn) {
            btn.addEventListener('click', function () {
                const todoId    = this.dataset.id;
                const todoTitle = this.dataset.title;

                currentDeleteFormId = 'delete-form-' + todoId;
                document.getElementById('deleteTodoTitle').textContent = '"' + todoTitle + '"';

                const modal = new bootstrap.Modal(document.getElementById('deleteConfirmModal'));
                modal.show();
            });
        });

        // Submit form xóa khi người dùng nhấn nút xác nhận trong modal
        document.getElementById('confirmDeleteBtn').addEventListener('click', function () {
            if (currentDeleteFormId) {
                document.getElementById(currentDeleteFormId).submit();
            }
        });

    });
</script>

</body>
</html>
